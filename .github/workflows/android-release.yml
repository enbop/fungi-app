name: "Android Release"

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"
      - "nightly"

jobs:
  android_release_build_and_publish:
    name: Android Release build and publish
    runs-on: ubuntu-22.04
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Resolve Fungi Artifact Source
        id: fungi_version
        shell: bash
        run: |
          FUNGI_VERSION=$(cat FUNGI_VERSION | tr -d '[:space:]')
          if [ "${{ github.event_name }}" = "workflow_dispatch" ] || [ "${{ github.ref_name }}" = "nightly" ]; then
            FUNGI_RELEASE_TAG="nightly"
            DIST_CHANNEL="nightly"
          else
            FUNGI_RELEASE_TAG="$FUNGI_VERSION"
            DIST_CHANNEL="stable"
          fi

          echo "FUNGI_VERSION=$FUNGI_VERSION" >> $GITHUB_ENV
          echo "FUNGI_RELEASE_TAG=$FUNGI_RELEASE_TAG" >> $GITHUB_ENV
          echo "DIST_CHANNEL=$DIST_CHANNEL" >> "$GITHUB_ENV"
          echo "Using Fungi version: $FUNGI_VERSION"
          echo "Downloading artifacts from release tag: $FUNGI_RELEASE_TAG"

      - name: Download Fungi Artifacts
        shell: bash
        run: |
          scripts/fetch_core_artifacts.sh \
            --channel "$DIST_CHANNEL" \
            --tag "$FUNGI_RELEASE_TAG" \
            --platform android \
            --arch arm64-v8a

      - name: Install Android Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y protobuf-compiler

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Accept Android Licenses
        run: |
          yes | "$ANDROID_HOME"/cmdline-tools/latest/bin/sdkmanager --licenses || true

      - name: Install Pub Dependencies
        run: flutter pub get

      - name: Configure app channel
        shell: bash
        run: |
          if [ "$DIST_CHANNEL" = "nightly" ]; then
            ANDROID_FLAVOR="nightly"
          else
            ANDROID_FLAVOR="stable"
          fi

          echo "ANDROID_FLAVOR=$ANDROID_FLAVOR" >> "$GITHUB_ENV"

      - name: Setup Android signing
        run: |
          echo "${{ secrets.ANDROID_UPLOAD_KEYSTORE_BASE64 }}" | base64 -d > android/app/upload-keystore.jks
          echo "storePassword=${{ secrets.ANDROID_KEYSTORE_PASSWORD }}" >> android/key.properties
          echo "keyPassword=${{ secrets.ANDROID_KEY_PASSWORD }}" >> android/key.properties  
          echo "keyAlias=${{ secrets.ANDROID_KEY_ALIAS }}" >> android/key.properties
          echo "storeFile=upload-keystore.jks" >> android/key.properties

      - name: Build Android
        shell: bash
        run: |
          scripts/build_android_dist.sh --channel "$DIST_CHANNEL" --target-platform android-arm64

          APK_PATH="$(find build/app/outputs/flutter-apk -maxdepth 1 -name "*${ANDROID_FLAVOR}*release*.apk" | head -n 1)"
          if [ -z "$APK_PATH" ]; then
            echo "::error::Android APK not found for flavor $ANDROID_FLAVOR"
            find build/app/outputs/flutter-apk -maxdepth 1 -type f -print
            exit 1
          fi

          cp "$APK_PATH" fungi-app-android-aarch64.apk

      - name: GH publish
        shell: bash
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ] || [ "${{ github.ref_name }}" = "nightly" ]; then
            RELEASE_TAG="nightly"
          else
            RELEASE_TAG="${{ github.ref_name }}"
          fi
          
          if [ -f fungi-app-android-aarch64.apk ]; then
            gh release upload -R ${{ github.repository }} --clobber $RELEASE_TAG fungi-app-android-aarch64.apk
          fi
