name: "Release"

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"
      - "nightly"

jobs:
  release_build_and_publish:
    name: Release build and publish
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-22.04
            target: linux
            platform-name: linux-x86_64
            fungi-artifact: fungi-linux-x86_64.tar.gz
            flutter-target-platform: linux-x64
          - os: macos-latest
            target: macos
            platform-name: macos-aarch64
            fungi-artifact: fungi-macos-aarch64.tar.gz
            macos-build-arch: arm64
          - os: macos-latest
            target: macos
            platform-name: macos-x86_64
            fungi-artifact: fungi-macos-x86_64.tar.gz
            macos-build-arch: x86_64
          - os: windows-latest
            target: windows
            platform-name: windows-x86_64
            fungi-artifact: fungi-windows-x86_64.tar.gz
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Resolve Fungi Artifact Source
        id: fungi_version
        shell: bash
        run: |
          FUNGI_VERSION=$(cat FUNGI_VERSION | tr -d '[:space:]')
          if [ "${{ github.event_name }}" = "workflow_dispatch" ] || [ "${{ github.ref_name }}" = "nightly" ]; then
            FUNGI_RELEASE_TAG="nightly"
          else
            FUNGI_RELEASE_TAG="$FUNGI_VERSION"
          fi

          echo "FUNGI_VERSION=$FUNGI_VERSION" >> $GITHUB_ENV
          echo "FUNGI_RELEASE_TAG=$FUNGI_RELEASE_TAG" >> $GITHUB_ENV
          echo "Using Fungi version: $FUNGI_VERSION"
          echo "Downloading artifacts from release tag: $FUNGI_RELEASE_TAG"

      - name: Download Fungi Artifacts
        shell: bash
        run: |
          mkdir -p fungi-artifacts
          BASE_URL="https://github.com/enbop/fungi/releases/download/${{ env.FUNGI_RELEASE_TAG }}"
          
          # Download binary artifact
          curl -fL -o fungi-artifacts/${{ matrix.fungi-artifact }} "$BASE_URL/${{ matrix.fungi-artifact }}"
          
          # Download proto file
          curl -fL -o fungi-artifacts/fungi_daemon.proto "$BASE_URL/fungi_daemon.proto"
          
          # Extract binary
          cd fungi-artifacts
          tar -xzf ${{ matrix.fungi-artifact }}
          rm ${{ matrix.fungi-artifact }}

      - name: Install Linux Dependencies
        if: matrix.target == 'linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y clang cmake ninja-build pkg-config libgtk-3-dev liblzma-dev libayatana-appindicator3-dev protobuf-compiler

      - name: Install macOS Dependencies
        if: matrix.target == 'macos'
        run: |
          brew install protobuf

      - name: Install Windows Dependencies
        if: matrix.target == 'windows'
        run: |
          choco install protoc
        shell: powershell

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true

      - name: Install Pub Dependencies
        run: flutter pub get

      - name: Configure app channel
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ] || [ "${{ github.ref_name }}" = "nightly" ]; then
            DIST_CHANNEL="nightly"
            FUNGI_APP_NAME="Fungi Dev"
          else
            DIST_CHANNEL="stable"
            FUNGI_APP_NAME="Fungi"
          fi

          echo "DIST_CHANNEL=$DIST_CHANNEL" >> "$GITHUB_ENV"
          echo "FUNGI_APP_NAME=$FUNGI_APP_NAME" >> "$GITHUB_ENV"

      - name: Build Linux
        if: matrix.target == 'linux'
        shell: bash
        run: |
          flutter config --enable-linux-desktop
          scripts/build_linux_dist.sh --channel "$DIST_CHANNEL" --target-platform ${{ matrix.flutter-target-platform }}

          BUNDLE_DIR=$(find build/linux -type d -path '*/release/bundle' | head -n 1)
          if [ -z "$BUNDLE_DIR" ]; then
            echo "::error::Linux bundle directory not found under build/linux"
            exit 1
          fi

          tar -czf fungi-app-${{ matrix.platform-name }}.tar.gz -C "$BUNDLE_DIR" .

      - name: Build macOS
        if: matrix.target == 'macos' && matrix.macos-build-arch == 'arm64'
        run: |
          flutter config --enable-macos-desktop
          scripts/build_macos_dist.sh --channel "$DIST_CHANNEL"
          tar -czf fungi-app-${{ matrix.platform-name }}.tar.gz -C build/macos/Build/Products/Release "$FUNGI_APP_NAME.app"

      - name: Build macOS x86_64
        if: matrix.target == 'macos' && matrix.macos-build-arch == 'x86_64'
        shell: bash
        run: |
          flutter config --enable-macos-desktop
          scripts/build_macos_dist.sh --channel "$DIST_CHANNEL" --config-only
          cd macos
          pod install
          cd ..

          xcodebuild \
            -workspace macos/Runner.xcworkspace \
            -scheme Runner \
            -configuration Release \
            -destination 'generic/platform=macOS' \
            -derivedDataPath build/macos-x86_64 \
            ARCHS=x86_64 \
            ONLY_ACTIVE_ARCH=NO \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY=""

          tar -czf fungi-app-${{ matrix.platform-name }}.tar.gz -C build/macos-x86_64/Build/Products/Release "$FUNGI_APP_NAME.app"

      - name: Build Windows
        if: matrix.target == 'windows'
        shell: bash
        run: |
          flutter config --enable-windows-desktop
          scripts/build_windows_dist.sh --channel "$DIST_CHANNEL"
          tar -czf fungi-app-${{ matrix.platform-name }}.tar.gz -C build/windows/x64/runner/Release .

      - name: Update nightly release notes
        if: (github.event_name == 'workflow_dispatch' || github.ref_name == 'nightly') && matrix.platform-name == 'linux-x86_64'
        shell: bash
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          BUILD_DATE="$(date -u +"%Y-%m-%dT%H:%M:%SZ")"
          gh release edit nightly \
            --title "Nightly Build" \
            --notes "Latest development build from commit ${{ github.sha }} (${BUILD_DATE})" \
            --target "${{ github.sha }}" || true

      - name: GH publish
        shell: bash
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ] || [ "${{ github.ref_name }}" = "nightly" ]; then
            RELEASE_TAG="nightly"
          else
            RELEASE_TAG="${{ github.ref_name }}"
          fi
          
          FILE_NAME="fungi-app-${{ matrix.platform-name }}.tar.gz"

          if [ ! -f "$FILE_NAME" ]; then
             echo "::error::File $FILE_NAME does not exist. Build failed to produce artifact."
             exit 1
          fi
          
          gh release upload -R ${{ github.repository }} --clobber $RELEASE_TAG "$FILE_NAME"

  update_homebrew_tap:
    name: Update Homebrew tap
    needs: release_build_and_publish
    if: github.event_name == 'push' && (startsWith(github.ref, 'refs/tags/v') || github.ref == 'refs/tags/nightly')
    runs-on: ubuntu-latest
    steps:
      - name: Trigger tap update
        env:
          TAP_REPO_TOKEN: ${{ secrets.TAP_REPO_TOKEN }}
        run: |
          if [ -z "$TAP_REPO_TOKEN" ]; then
            echo "TAP_REPO_TOKEN is not set; skipping tap update."
            exit 0
          fi

          if [ "${{ github.ref_name }}" = "nightly" ]; then
            payload='{"event_type":"update_fungi_app_tap","client_payload":{"channel":"nightly"}}'
          else
            payload='{"event_type":"update_fungi_app_tap","client_payload":{"channel":"stable"}}'
          fi

          curl -fsSL -X POST \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer ${TAP_REPO_TOKEN}" \
            https://api.github.com/repos/enbop/homebrew-fungi/dispatches \
            -d "$payload"
